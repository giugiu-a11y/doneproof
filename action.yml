name: DoneProof Check
description: Validate a DoneProof receipt before an AI-authored pull request is treated as ready.

inputs:
  receipt:
    description: Path to the DoneProof receipt.
    required: false
    default: .doneproof/receipts/latest.json
  root:
    description: Repository root.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install DoneProof
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Check receipt
      shell: bash
      run: doneproof check --root "${{ inputs.root }}" --receipt "${{ inputs.receipt }}"

